<!DOCTYPE html>
<html lang="el">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Search Engine ΔΙΠΑΕ</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <button id="homeBtn" class="home-btn">Αναζήτηση ΔΙΠΑΕ</button>

      <form class="card" id="searchForm">
        <div class="search-row">
          <input id="query" type="search" placeholder="Αναζήτηση..." />
          <button type="submit" id="searchBtn">ΑΝΑΖΗΤΗΣΗ</button>
        </div>

        <div class="results" id="results"></div>
      </form>
    </div>

    <script src="script.js"></script>
  </body>
</html>
